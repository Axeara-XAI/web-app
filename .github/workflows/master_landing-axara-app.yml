# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - landing-axara-app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and Build
        run: |
          npm ci
          npm run build

      - name: Prepare and ZIP standalone deployment
        run: |
          # 1. Siapkan folder sementara
          mkdir -p deploy_package
          
          # 2. Salin semua file (termasuk yang disembunyikan)
          cp -a .next/standalone/. deploy_package/
          cp -a .next/static deploy_package/.next/
          cp -a public deploy_package/
          
          # 3. KUNCI JAWABANNYA DI SINI: Kita zip manual!
          cd deploy_package
          zip -r ../deploy.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # HANYA UPLOAD FILE ZIP-NYA SAJA
          path: deploy.zip 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A6A820A84334A2398FA1529A4855AD3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B11AD07D25E4EF0AC0AEEF46B43909F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F55C5001E9524C57910B31B69B6AF95B }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'landing-axara-app'
          slot-name: 'Production'
          # LANGSUNG DEPLOY FILE ZIP-NYA KE AZURE
          package: deploy.zip